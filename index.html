<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Películas en Cartelera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .spinner-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }
    .spinner-overlay .spinner-border {
      width: 4rem;
      height: 4rem;
    }
    .spinner-overlay p {
      color: white;
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div id="loadingScreen" class="spinner-overlay">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
  <p>🎬 Cargando películas... Espera 5 segundos</p>
  <p class="small">Los mejores estrenos están por llegar</p>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">CinePlus</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="pages/renta.html">Rentar</a></li>
        <li class="nav-item"><a class="nav-link" href="pages/contacto.html">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="bg-primary text-white text-center p-4">
  <h1>Películas en Cartelera</h1>
  <p class="lead">Consulta los estrenos y favoritos del público</p>
</header>

<main class="container py-4">
  <div class="row" id="lista-peliculas"></div>
</main>

<footer class="bg-dark text-white text-center p-3">
  CinePlus © 2024
</footer>

<!-- MODAL TRÁILER -->
<div class="modal fade" id="modalTrailer">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5>🎬 Tráiler</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <iframe id="videoTrailer" width="100%" height="400"></iframe>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function () {

    $("nav, header, main, footer").css("visibility", "hidden");
    

    setTimeout(function() {
        
        $("#loadingScreen").fadeOut(500);
      
        $("nav, header, main, footer").css("visibility", "visible").hide().fadeIn(800);
        
        $.ajax({
            url: "data/peliculas.json",
            method: "GET",
            dataType: "json",
            success: function (peliculas) {
                console.log(" JSON cargado", peliculas);
                let html = "";

                peliculas.forEach(function (peli) {
                    const hoy = new Date();
                    const fechaEstreno = new Date(peli.estreno);
                    let precio = hoy < fechaEstreno ? peli.precios.estreno : peli.precios.normal;
                    let estado = hoy < fechaEstreno ? "🎬 ESTRENO" : "📽️ CARTELERA";
                    let badge = hoy < fechaEstreno ? "bg-danger" : "bg-secondary";

                    let rutaImagen = peli.imagen;
                    if (rutaImagen && !rutaImagen.startsWith("http") && !rutaImagen.startsWith("/")) {
                        rutaImagen = rutaImagen;
                    }

                    html += `
                        <div class="col-md-4 mb-4">
                            <div class="card shadow h-100">
                                <img src="${rutaImagen}" class="card-img-top" 
                                     style="height: 300px; object-fit: cover;"
                                     onerror="this.src='https://via.placeholder.com/300x450?text=${encodeURIComponent(peli.titulo)}'">
                                <div class="card-body">
                                    <h5>${peli.titulo}</h5>
                                    <p>${peli.generos.join(" • ")}</p>
                                    <span class="badge ${badge}">${estado}</span>
                                    <p class="mt-2"><strong>$${precio}</strong></p>
                                    <button class="btn btn-danger ver-trailer mt-2 w-100 mb-2"
                                        data-trailer="${peli.trailer}">
                                        ▶️ Ver tráiler
                                    </button>
                                    <a href="pages/detalle.html?id=${peli.id}"
                                       class="btn btn-primary w-100">
                                       Ver más
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                });

                $("#lista-peliculas").html(html);
            },
            error: function() {
                $("#lista-peliculas").html(`
                    <div class="alert alert-danger text-center">
                        ❌ Error cargando películas<br>
                        <small>Verifica: data/peliculas.json</small>
                    </div>
                `);
            }
        });
        
    }, 5000); 
    
  
    $(document).on("click", ".ver-trailer", function () {
        const trailer = $(this).data("trailer");
        $("#videoTrailer").attr("src", trailer);
        new bootstrap.Modal(document.getElementById("modalTrailer")).show();
    });
    
    $('#modalTrailer').on('hidden.bs.modal', function () {
        $("#videoTrailer").attr("src", "");
    });
    
    if (!localStorage.getItem("bienvenido")) {
        setTimeout(() => {
            alert("🎬 ¡Bienvenido a CinePlus! Disfruta de nuestras películas.");
            localStorage.setItem("bienvenido", "true");
        }, 1000);
    }
});
</script>

</body>
</html>
