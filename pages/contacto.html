<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="../index.html">CinePlus</a>
    <div>
      <a class="nav-link" href="../index.html">Inicio</a>
      <a class="nav-link" href="renta.html">Rentar</a>
      <a class="nav-link active" href="contacto.html">Contacto</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2> Contacto</h2>

  <form id="form-contacto">
    
    <div class="mb-3">
      <label>Nombre</label>
      <input type="text" id="nombre" class="form-control">
      <small class="text-danger" id="error-nombre"></small>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" id="email" class="form-control">
      <small class="text-danger" id="error-email"></small>
    </div>

    <div class="mb-3">
      <label>Mensaje</label>
      <textarea id="mensaje" class="form-control"></textarea>
      <small class="text-danger" id="error-mensaje"></small>
    </div>

    <button type="submit" class="btn btn-primary">Enviar</button>

  </form>

  <div id="exito" class="mt-3"></div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
