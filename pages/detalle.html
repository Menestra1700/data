<!DOCTYPE html>
<html lang="es">
<head> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Película</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div id="detalle-pelicula"></div>
  <div class="mt-4">
    <h4>📝 Reseñas de usuarios</h4>
    <div id="lista-resenas"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  
  console.log("ID buscado:", id);

  $.ajax({
    url: "../data/peliculas.json", 
    method: "GET",
    dataType: "json",
    success: function (peliculas) {
      console.log("Películas cargadas:", peliculas);
      const peli = peliculas.find(p => p.id == id);
      
      if (!peli) {
        $("#detalle-pelicula").html('<div class="alert alert-danger">Película no encontrada</div>');
        return;
      }
      
      console.log("Película encontrada:", peli.titulo);
      
      const hoy = new Date();
      const fechaEstreno = new Date(peli.estreno);
      const precio = hoy < fechaEstreno ? peli.precios.estreno : peli.precios.normal;
      const estado = hoy < fechaEstreno ? "🎬 ESTRENO" : "📽️ CARTELERA REGULAR";
      const badgeClass = hoy < fechaEstreno ? "bg-danger" : "bg-secondary";
      
      let rutaImagen = peli.imagen;
      if (!rutaImagen.startsWith("http") && !rutaImagen.startsWith("/")) {
        rutaImagen = "../" + rutaImagen;
      }
      
      $("#detalle-pelicula").html(`
        <div class="card shadow">
          <img src="${rutaImagen}" class="card-img-top" onerror="this.src='https://via.placeholder.com/300x450?text=${peli.titulo}'">
          <div class="card-body">
            <h2>${peli.titulo}</h2>
            <p><strong>Géneros:</strong> ${peli.generos.join(", ")}</p>
            <p>${peli.sinopsis}</p>
            <p><span class="badge ${badgeClass} fs-6">${estado}</span></p>
            <p class="fs-4"><strong>Precio: $${precio}</strong></p>
            <button class="btn btn-danger" onclick="verTrailer('${peli.trailer}')">🎬 Ver tráiler</button>
          </div>
        </div>
      `);
    },
    error: function(xhr, status, error) {
      console.error("Error cargando películas:", error);
      $("#detalle-pelicula").html(`
        <div class="alert alert-danger">
          ❌ Error al cargar la película<br>
          <small>Ruta buscada: ../data/peliculas.json</small>
        </div>
      `);
    }
  });

  $.ajax({
    url: "../data/resenas.json",
    method: "GET",
    dataType: "json",
    success: function (resenas) {
      console.log("Reseñas cargadas:", resenas);
      const filtradas = resenas.filter(r => r.peliculaId == id);
      
      console.log("Reseñas filtradas:", filtradas);
      
      if (filtradas.length === 0) {
        $("#lista-resenas").html('<div class="alert alert-info">⭐ No hay reseñas para esta película</div>');
        return;
      }
      
      let html = "";
      filtradas.forEach(function(r) {
        let estrellas = "";
        for (let i = 1; i <= 5; i++) {
          estrellas += i <= r.calificacion ? "⭐" : "☆";
        }
        
        html += `
          <div class="card mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center">
                <strong>${r.usuario || "Usuario"}</strong>
                <span class="text-warning fs-5">${estrellas}</span>
              </div>
              <p class="mt-2 mb-2">${r.comentario}</p>
              <small class="text-muted">${r.fecha || "Fecha no disponible"}</small>
            </div>
          </div>
        `;
      });
      
      $("#lista-resenas").html(html);
    },
    error: function(xhr, status, error) {
      console.error("Error cargando reseñas:", error);
      $("#lista-resenas").html(`
        <div class="alert alert-warning">
          ⚠️ No se pudieron cargar las reseñas<br>
          <small>Ruta buscada: ../data/resenas.json</small>
        </div>
      `);
    }
  });
});

function verTrailer(url) {
  if (!url) {
    alert("Tráiler no disponible");
    return;
  }
  
  if ($("#trailerModal").length === 0) {
    $("body").append(`
      <div class="modal fade" id="trailerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">🎬 Tráiler</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="videoContainer"></div>
            </div>
          </div>
        </div>
      </div>
    `);
  }
  
  $("#videoContainer").html(`
    <iframe width="100%" height="400" src="${url}" frameborder="0" allowfullscreen></iframe>
  `);
  
  new bootstrap.Modal(document.getElementById("trailerModal")).show();
}
</script>

</body>
</html>
